<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>Ritverktyg — Fastighetsgränser</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a2130;
    color: #dce8f0;
  }

  #map { flex: 1; }

  #panel {
    width: 280px;
    flex-shrink: 0;
    background: #1e2c3a;
    border-left: 1px solid #2e4258;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }

  .panel-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid #2e4258;
  }
  .panel-header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #7aafd4;
  }
  .panel-header p {
    font-size: 11px;
    color: #5a7a96;
    margin-top: 4px;
    line-height: 1.5;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #2e4258;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #5a7a96;
    margin-bottom: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #2e4258;
    border-radius: 5px;
    background: #243447;
    color: #dce8f0;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background .15s, border-color .15s;
    margin-bottom: 6px;
  }
  .btn:last-child { margin-bottom: 0; }
  .btn:hover { background: #2e4258; border-color: #3d5a78; }
  .btn.active { background: #1a4a6e; border-color: #4a9eff; color: #7ec8ff; }
  .btn-danger { border-color: #5c2020; background: #2d1a1a; color: #ff7070; }
  .btn-danger:hover { background: #3d2020; }
  .btn-success { border-color: #1a5c2a; background: #1a2d1e; color: #70e090; }
  .btn-success:hover { background: #1e3a24; }

  #status {
    font-size: 12px;
    color: #7aafd4;
    padding: 10px 0 0;
    min-height: 36px;
    line-height: 1.5;
  }

  #coords-box {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }
  #coords-list {
    font-size: 11px;
    font-family: "Cascadia Code", "Fira Mono", "Consolas", monospace;
    color: #5a9abf;
    line-height: 1.7;
  }
  #coords-list .pt {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  #coords-list .pt:hover { color: #7aafd4; }
  #coords-list .idx { color: #3d5a78; width: 18px; flex-shrink: 0; }

  #wkt-section {
    padding: 14px 16px;
    border-top: 1px solid #2e4258;
  }
  #wkt-out {
    font-size: 10px;
    font-family: monospace;
    background: #111b26;
    border: 1px solid #2e4258;
    border-radius: 4px;
    padding: 8px;
    color: #4a7a9f;
    word-break: break-all;
    max-height: 80px;
    overflow-y: auto;
    margin-bottom: 8px;
    display: none;
  }

  .cursor-crosshair { cursor: crosshair !important; }
  .leaflet-container { background: #1a2130; }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="panel-header">
    <h1>Ritverktyg</h1>
    <p>Rita en polygon längs fastighetsgränserna. Dubbelklicka för att stänga.</p>
  </div>

  <div class="section">
    <div class="section-label">Verktyg</div>
    <button class="btn" id="btn-draw" onclick="startDraw()">✏️ Rita polygon</button>
    <button class="btn btn-danger" id="btn-clear" onclick="clearAll()">✕ Rensa</button>
    <div id="status">Klicka på Rita polygon för att börja.</div>
  </div>

  <div id="coords-box">
    <div class="section-label">Punkter</div>
    <div id="coords-list"></div>
  </div>

  <div id="wkt-section">
    <div class="section-label">Exportera</div>
    <div id="wkt-out"></div>
    <button class="btn btn-success" onclick="copyWKT()">📋 Kopiera WKT</button>
  </div>
</div>

<script>
var map = L.map('map', { zoomControl: true }).setView([63.28, 13.25], 12);

L.tileLayer('/combined/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© Lantmäteriet CC-BY'
}).addTo(map);

var drawing = false;
var points  = [];   // [[lat,lon], ...]
var markers = [];
var polyline = null;
var polygon  = null;

function startDraw() {
  drawing = true;
  document.getElementById('btn-draw').classList.add('active');
  document.getElementById('status').textContent = 'Klicka på kartan för att lägga till punkter. Dubbelklicka för att avsluta.';
  document.getElementById('map').classList.add('cursor-crosshair');
}

map.on('click', function(e) {
  if (!drawing) return;
  var ll = [e.latlng.lat, e.latlng.lng];
  points.push(ll);

  var m = L.circleMarker(ll, { radius: 5, color: '#4a9eff', fillColor: '#4a9eff', fillOpacity: 1, weight: 2 }).addTo(map);
  markers.push(m);

  if (polyline) map.removeLayer(polyline);
  if (points.length > 1) {
    polyline = L.polyline(points, { color: '#4a9eff', weight: 2, dashArray: '6 4', opacity: .8 }).addTo(map);
  }
  updateCoordList();
});

map.on('dblclick', function(e) {
  if (!drawing || points.length < 3) return;
  L.DomEvent.stop(e);
  finishDraw();
});

function finishDraw() {
  drawing = false;
  document.getElementById('btn-draw').classList.remove('active');
  document.getElementById('map').classList.remove('cursor-crosshair');

  if (polyline) { map.removeLayer(polyline); polyline = null; }

  if (polygon) map.removeLayer(polygon);
  polygon = L.polygon(points, { color: '#cc3333', fillColor: '#cc3333', fillOpacity: .3, weight: 2 }).addTo(map);

  document.getElementById('status').textContent = 'Polygon klar — ' + points.length + ' punkter.';
  updateCoordList();
  showWKT();
}

function clearAll() {
  drawing = false;
  points  = [];
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
  if (polyline) { map.removeLayer(polyline); polyline = null; }
  if (polygon)  { map.removeLayer(polygon);  polygon  = null; }
  document.getElementById('btn-draw').classList.remove('active');
  document.getElementById('map').classList.remove('cursor-crosshair');
  document.getElementById('coords-list').innerHTML = '';
  document.getElementById('wkt-out').style.display = 'none';
  document.getElementById('status').textContent = 'Klicka på Rita polygon för att börja.';
}

function updateCoordList() {
  var html = '';
  points.forEach(function(p, i) {
    html += '<div class="pt"><span class="idx">' + (i+1) + '</span>'
          + '<span>' + p[0].toFixed(6) + '</span>'
          + '<span>' + p[1].toFixed(6) + '</span></div>';
  });
  document.getElementById('coords-list').innerHTML = html;
}

function makeWKT() {
  if (points.length < 3) return '';
  var closed = points.concat([points[0]]);
  var pairs = closed.map(function(p){ return p[1].toFixed(6) + ' ' + p[0].toFixed(6); });
  return 'POLYGON((' + pairs.join(', ') + '))';
}

function showWKT() {
  var wkt = makeWKT();
  var el = document.getElementById('wkt-out');
  el.textContent = wkt;
  el.style.display = 'block';
}

function copyWKT() {
  var wkt = makeWKT();
  if (!wkt) { alert('Rita en polygon först.'); return; }
  navigator.clipboard.writeText(wkt).then(function(){
    document.getElementById('status').textContent = '✓ WKT kopierat till urklipp!';
  });
}
</script>
</body>
</html>
